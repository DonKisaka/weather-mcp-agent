spring.application.name=weather-mcp-server

# HTTP MCP server runs on its own port; the agent connects here.
server.port=8081

# MCP server identity advertised to clients
spring.ai.mcp.server.name=weather-mcp-server
spring.ai.mcp.server.version=0.0.1

# Streamable HTTP transport (the recipe you just did)
spring.ai.mcp.server.protocol=STREAMABLE
