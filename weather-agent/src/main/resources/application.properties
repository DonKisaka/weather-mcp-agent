spring.application.name=weather-agent

# Agent REST API port
server.port=8080

# --- Anthropic Claude ---
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-haiku-4-5-20251001

# --- MCP client -> Streamable HTTP connection to the weather MCP server ---
spring.ai.mcp.client.streamable-http.connections.weather.url=http://localhost:8081

# Expose the discovered MCP tools as tool callbacks for the ChatClient
spring.ai.mcp.client.toolcallback.enabled=true
